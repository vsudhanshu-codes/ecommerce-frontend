<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Frontend</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="header">

    <!-- Logo -->
    <div class="logo">
        <h2>E-Shop</h2>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Search Bar -->
    <div class="search-bar">
        <input type="text" placeholder="Search products...">
        <button>Search</button>
    </div>

    <!-- Cart Icon -->
    <div class="cart">
        🛒 <span class="cart-count">0</span>
    </div>

    <!-- Hamburger Menu -->
    <div class="hamburger">
        ☰
    </div>

</header>
<section class="hero">

  <div class="hero-content">
    
    <h1>Biggest Sale of the Year!</h1>
    
    <p>Discover amazing products with up to 50% discount.</p>
    
    <a href="#products" class="cta-btn">Shop Now</a>

  </div>

</section>
    <script src="scripts/app.js"></script>
</body>
</html>
